description: |
  A locked cabin. A body that shouldn't be there. And a System that only tells
  you what you ask. Theron Mavik graduated top of his class — all theory, no
  practice — and spends his first three days off standing over a corpse aboard an
  airship pulled across the mountains by three enormous drakes. He is the only
  investigator on board, his System surfaces a fact only once he earns it, and the
  dead man at the center of his neat little case was not who the passenger list
  says he was. A cozy, fair-play LitRPG mystery.
